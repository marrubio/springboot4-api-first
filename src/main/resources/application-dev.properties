server.servlet.context-path=/api

# DataSource Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres?currentSchema=app
spring.datasource.username=app_user
spring.datasource.password=pass123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.default_schema=app
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Security Configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://keycloak/realms/testapp
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://keycloak/realms/testapp/protocol/openid-connect/certs

# CORS Configuration
app.cors.allowed-origins=http://localhost:3000

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

